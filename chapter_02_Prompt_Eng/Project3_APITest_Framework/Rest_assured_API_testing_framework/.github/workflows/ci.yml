name: REST Assured API Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run API Tests
        working-directory: chapter_02_Prompt_Eng/Project3_APITest_Framework/Rest_assured_API_testing_framework
        env:
          BASE_URL:   ${{ secrets.BASE_URL }}
          AUTH_TYPE:  ${{ secrets.AUTH_TYPE }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: mvn clean test --no-transfer-progress

      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extent-report-${{ github.run_number }}
          path: chapter_02_Prompt_Eng/Project3_APITest_Framework/Rest_assured_API_testing_framework/target/reports/

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs-${{ github.run_number }}
          path: chapter_02_Prompt_Eng/Project3_APITest_Framework/Rest_assured_API_testing_framework/target/logs/
